<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<!-- tailwind desy  -->
 <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<style>
  
</style>

</head>
<body>
  
    <section id="navbar-section" class=" flex justify-between  bg-base-100 shadow-sm ">
  <div class="flex gap-2 items-center">
    <img src="./assets/github-logo.png" alt="" class="h-8">
    <h3>GitHub Issues Tracker</h3>
  </div>
  <div class="flex gap-2">
    <input type="text" placeholder="Search" class="input input-bordered w-24 md:w-auto" />
        <button class="btn btn-primary">Primary</button>
         </div>
    </section>

    <section di="button-container" class= "w-[80%] mx-auto h-full p-5 border-gray-300 shadow-sm my-2">
        <button  onclick="" id="btn-all" class="category-btn  active btn btn-primary w-[100px] h-[40px]">All</button>
        <button onclick="" id="btn-open" class=" category-btn btn btn-primary w-[100px] h-[40px]">Open</button>
        <button onclick="" di="btn-close" class=" category-btn btn btn-primary w-[100px] h-[40px] ">Closed</button>

    </section>
    

    <section di="card-nevbar" class= "w-[80%] mx-auto h-full p-1 flex gap-3  border-gray-300 shadow-sm my-2">
        <div><img src="./assets/Aperture.png" alt=""></div> 
        
        </div>
        <div class="flex gap-[600px] justify-between ">
        <div class="grid">
            <h1 class="font-bold">50 Issues</h1>
            <p class="text-gray-500">Track and manage your project issues</p>
        </div>
        <div class="flex items-center gap-2 ">
          <span class="w-3 h-3 bg-emerald-500 rounded-full"></span>
          <span>Open</span>
          <span class="w-3 h-3 bg-purple-500 rounded-full"></span>
          <span>Closed</span>
        </div>
        </div>

    
        
    


    </section>

    <section class=""> 
     <div id="card-container" class="w-[80%] mx-auto  grid lg:grid-cols-4 gap-2"> 
       
    </section>

    <!-- modal -->
     <section>

        <div id="issueModal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center">
            <div class="bg-white w-[600px] rounded-lg p-6 shadow-lg">
                <h2 id="modalTitle" class="text-2xl font-bold mb-2 ">Fix broken image uploads</h2>
                <div class="flex items-center gap-3 text-sm mb-3">
                    <span class="bg-green-500 text-white px-3 py-1 rounded-full text-xs">Opened</span>
            <span class="text-gray-500">Opened by <b id="modalAuthor"></b></span>

<span class="text-gray-400" id="modalDate">
22/02/2026
</span>

</div>

<div class="flex gap-2 mb-4">

<span class="bg-red-100 text-red-600 px-3 py-1 rounded-full text-xs">
BUG
</span>

<span class="bg-yellow-100 text-yellow-600 px-3 py-1 rounded-full text-xs">
HELP WANTED
</span>

</div>

<p id="modalDesc" class="text-gray-600 mb-6">
The navigation menu doesn't collapse properly on mobile devices. Need to fix the responsive behavior.
</p>

<div class="flex justify-between">

<div>
<p class="text-gray-500 text-sm">Assignee:</p>
<p id="modalAssignee" class="font-semibold"></p>
</div>

<div>
<p class="text-gray-500 text-sm">Priority:</p>

<span id="modalPriority"
class="bg-red-500 text-white px-3 py-1 rounded-full text-xs">
HIGH
</span>

</div>

</div>

<div class="flex justify-end mt-6">

<button onclick="closeModal()"
class="bg-purple-600 text-white px-5 py-2 rounded">
Close
</button>

</div>

</div>

</div>

     </section>



    <script src="./js-file/script2.js"></script>
</body>
</html>
