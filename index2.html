<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<!-- tailwind desy  -->
 <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<style>
  .line-clamp-2 {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .category-btn.active {
      opacity: 1;
    }
    .category-btn {
      opacity: 0.6;
    }
</style>

</head>
<body class="bg-gray-100">

  <!-- Navbar -->
  <section id="navbar-section" class="flex justify-between bg-base-100 shadow-sm p-4">
    <div class="flex gap-2 items-center">
      <img src="./assets/github-logo.png" alt="Logo" class="h-8">
      <h3>GitHub Issues Tracker</h3>
    </div>
    <div class="flex gap-2">
      <input type="text" id="searchInput" placeholder="Search" class="input input-bordered w-24 md:w-auto">
       <button id="searchBtn" class="btn btn-primary">Search</button>
    </div>
  </section>

  <!-- Tabs Section -->
  <section id="button-container" class="w-[80%] mx-auto h-full p-5 shadow-sm my-2 flex gap-2">
    <button id="btn-all" class="category-btn active btn btn-primary w-[100px] h-[40px]">All</button>
    <button id="btn-open" class="category-btn btn btn-primary w-[100px] h-[40px]">Open</button>
    <button id="btn-closed" class="category-btn btn btn-primary w-[100px] h-[40px]">Closed</button>
  </section>

  <!-- Info Section -->
  <section class="w-[80%] mx-auto h-full p-1 flex justify-between items-center border-gray-300 shadow-sm my-2">
    <div class="flex items-center gap-2">
      <img src="./assets/Aperture.png" alt="Icon" class="w-12 h-12">
      <div>
        <h1 class="font-bold" id="issueCount">0 Issues</h1>
        <p class="text-gray-500">Track and manage your project issues</p>
      </div>
    </div>
    <div class="flex items-center gap-2">
      <span class="w-3 h-3 bg-emerald-500 rounded-full"></span>
      <span>Open</span>
      <span class="w-3 h-3 bg-purple-500 rounded-full"></span>
      <span>Closed</span>
    </div>
  </section>

  <!-- Card Container -->
  <section>
    <div id="card-container" class="w-[80%] mx-auto grid lg:grid-cols-4 gap-4">
      <!-- Cards loaded here dynamically -->
    </div>
  </section>

  <!-- Modal -->
  <section>
    <div id="issueModal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center">
      <div class="bg-white w-[600px] rounded-lg p-6 shadow-lg">
        <h2 id="modalTitle" class="text-2xl font-bold mb-2">Title</h2>
        <div class="flex items-center gap-3 text-sm mb-3">
          <span id="modalStatus" class="px-3 py-1 rounded-full text-xs"></span>
          <span class="text-gray-500">Opened by <b id="modalAuthor"></b></span>
          <span class="text-gray-400" id="modalDate"></span>
        </div>
        <div class="flex gap-2 mb-4" id="modalLabels">
          <!-- Labels dynamically added -->
        </div>
        <p id="modalDesc" class="text-gray-600 mb-6">Description</p>
        <div class="flex justify-between">
          <div>
            <p class="text-gray-500 text-sm">Assignee:</p>
            <p id="modalAssignee" class="font-semibold"></p>
          </div>
          <div>
            <p class="text-gray-500 text-sm">Priority:</p>
            <span id="modalPriority" class="bg-red-500 text-white px-3 py-1 rounded-full text-xs">HIGH</span>
          </div>
        </div>
        <div class="flex justify-end mt-6">
          <button onclick="closeModal()" class="bg-purple-600 text-white px-5 py-2 rounded">Close</button>
        </div>
      </div>
    </div>
  </section>



<script src="./js-file/script2.js"></script>
</body>
</html>
